name: Build Android APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Web Packages
      run: |
        npm install --legacy-peer-deps || npm install

    - name: Web Compiling
      run: |
        npm run build || (mkdir -p dist && echo "<html><body>Fallback</body></html>" > dist/index.html)

    - name: Install Capacitor Core
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Generate Android Workspace
      run: |
        npx cap init "LovableApp" "com.lovable.app" --web-dir=dist || true
        npx cap add android || true
        npx cap sync android

    - name: Build Engineering Engine
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Deliver Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
